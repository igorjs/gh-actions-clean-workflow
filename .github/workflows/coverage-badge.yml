# SPDX-License-Identifier: Apache-2.0
#
# Templated by repo-config/modules/hardened-repo/main.tf (variable
# manage_workflow_coverage_badge). Direct edits in the consuming repo are
# overwritten on the next `terraform apply` against repo-config.
#
# Runs the test suite with coverage after every push to main, then
# publishes a Shields.io endpoint JSON to the gh-pages branch so the
# README badge always reflects the latest coverage without a third-party
# service (no Codecov account, no token).
#
# Prerequisites (per consuming repo):
#   1. A `test:coverage` script in package.json that runs the test suite
#      with coverage and writes coverage/coverage-summary.json in the
#      Istanbul json-summary format (Vitest: reporter: ['json-summary']).
#   2. GitHub Pages enabled on the repo (or the gh-pages branch allowed).
#
# Badge URL to use in README.md:
#   https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/<owner>/<repo>/gh-pages/badges/coverage.json

name: Coverage Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: coverage-badge
  cancel-in-progress: true

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            codeload.github.com:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            nodejs.org:443
            raw.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '26'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Build badge JSON
        run: |
          mkdir -p _badges
          PCT=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          PCT_INT=${PCT%.*}
          if   [ "$$PCT_INT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$$PCT_INT" -ge 80 ]; then COLOR=green
          elif [ "$$PCT_INT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$$PCT_INT" -ge 60 ]; then COLOR=yellow
          elif [ "$$PCT_INT" -ge 50 ]; then COLOR=orange
          else                              COLOR=red
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$$PCT" "$$COLOR" > _badges/coverage.json
          cat _badges/coverage.json

      - name: Publish badge to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_badges
          destination_dir: badges
          keep_files: true
          commit_message: "chore: update coverage badge"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
