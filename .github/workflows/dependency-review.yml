# SPDX-License-Identifier: Apache-2.0
#
# Templated by repo-config/modules/hardened-repo/main.tf (variable
# manage_workflow_dependency_review). Direct edits in the consuming repo
# are overwritten on the next `terraform apply` against repo-config.
#
# Checks every PR for new dependencies that carry known CVEs in the GitHub
# Advisory Database. Complements osv-scan (which runs on push to main) by
# blocking vulnerable dependencies BEFORE they are merged.
#
# Free for public repos. Not available on private repos on the free tier
# (returns 403); set manage_workflow_dependency_review = false there.

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: false
