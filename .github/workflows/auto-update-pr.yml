# Managed by github.com/igorjs-iac/repo-config
name: Auto-Update PRs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
      # Mint a bot App token so branch updates are attributed to the App (which
      # has write access), not github-actions[bot]. Updates pushed with the
      # default GITHUB_TOKEN surface as "workflow awaiting approval" on the PRs.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Update open PRs with latest main
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
            });

            for (const pr of pulls.data) {
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                core.info(`Updated PR #${pr.number}: ${pr.title}`);
              } catch (err) {
                if (err.status === 422) {
                  core.info(`PR #${pr.number} already up-to-date`);
                } else {
                  core.warning(`Failed to update PR #${pr.number}: ${err.message}`);
                }
              }
            }
