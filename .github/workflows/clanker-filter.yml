# SPDX-License-Identifier: Apache-2.0
# Managed by github.com/igorjs-iac/repo-config
#
# Templated by repo-config/modules/hardened-repo/main.tf (variable
# manage_workflow_clanker_filter). Direct edits in the consuming repo are
# overwritten on the next `terraform apply` against repo-config.
#
# Rejects three classes of PRs that carry insufficient signal:
#   1. AI-generated PRs -- identified by bot authors (not on the allow-list)
#      or AI-disclosure markers in the title/body (e.g. "Generated by Claude").
#      AI assistance in writing code is fine; undisclosed AI authorship is not.
#   2. PRs without a linked issue -- a "Closes #N" reference is the minimum
#      signal that the change was intentional and traceable.
#   3. PRs whose title, body, or added diff lines contain em (U+2014) or en
#      (U+2013) dashes. ASCII-only punctuation is a project convention;
#      these characters are also a frequent tell of AI-generated text. The
#      diff scan checks added lines only so a PR removing em/en dashes
#      (cleaning them up) passes; LICENSE / NOTICE / COPYING files are
#      exempt since upstream third party text legitimately contains them.
#
# SAFETY: pull_request_target runs with base-branch write context even for
# fork PRs. This workflow intentionally has NO checkout step so that no
# untrusted code from the PR head can be executed. The diff scan uses the
# REST API (pulls.listFiles) which returns the patch text, not file
# contents, so untrusted code is never evaluated.

name: PR Quality Gate

on:
  pull_request_target:
    # Re-evaluate on every event that can change the PR's signal: open /
    # reopen / ready-for-review (initial gate), edited (title or body
    # change can flip the linked-issue or AI-marker checks), synchronize
    # (commits push; rare but covers force-pushes that overwrite the body
    # through API edits).
    types: [opened, reopened, ready_for_review, edited, synchronize]

# Minimal top-level grant; the single job below requests only what it needs.
permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443

      - name: Evaluate PR quality
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr      = context.payload.pull_request;
            const author  = pr.user.login;
            const title   = pr.title  || '';
            const body    = pr.body   || '';

            // Skip closed PRs entirely: the rejection has already happened
            // (or the PR was closed for an unrelated reason). Re-running on
            // `edited`/`synchronize` against a closed PR would double-post
            // the rejection comment and re-apply labels for no benefit.
            if (pr.state === 'closed') {
              core.info('PR #' + pr.number + ' is closed; skipping quality gate');
              return;
            }

            // Labels this workflow manages. Cleared on the success path so
            // a previously-rejected PR that's been reopened with the fix in
            // place doesn't carry stale labels forever.
            const MANAGED_LABELS = ['gate:quality:needs-issue', 'gate:quality:unapproved-bot', 'gate:quality:rejected'];
            const currentLabels = (pr.labels || []).map(l => l.name);

            async function clearManagedLabels() {
              for (const label of MANAGED_LABELS) {
                if (!currentLabels.includes(label)) continue;
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: pr.number,
                    name:  label,
                  });
                  core.info('Removed stale label: ' + label);
                } catch { /* label may have been removed manually; non-fatal */ }
              }
            }

            // Bots that are explicitly allowed to open PRs without human authorship.
            const ALLOWED_BOTS = ['dependabot[bot]', 'github-actions[bot]', 'igorjs[bot]'];
            if (ALLOWED_BOTS.includes(author)) {
              core.info('Skipping allowed bot: ' + author);
              await clearManagedLabels();
              return;
            }

            // Authors exempt from all quality-gate checks (AI-tell detection,
            // dash scan, linked-issue requirement). Unapproved-bot rejection
            // above still applies regardless of this list.
            const ALLOWLISTED_AUTHORS = ["igorjs"];
            if (ALLOWLISTED_AUTHORS.includes(author)) {
              core.info('Author ' + author + ' is on the quality-gate allowlist; skipping all checks');
              await clearManagedLabels();
              return;
            }

            // Opaque rejection message shared by every AI-tell gate.
            //
            // RATIONALE: explaining WHY a PR was rejected (the specific
            // pattern, the offending characters, the regex that fired)
            // hands AI tools a learnable training signal. They will then
            // bypass the gate on the next attempt. Every gate aimed at
            // detecting AI authorship therefore posts the SAME generic
            // message to the PR and logs the specific reason to the
            // workflow run instead (maintainer-visible, not author-
            // visible). Gates aimed at structural project conventions
            // (linked issue, allowed bot author) remain specific
            // because they need to be human-actionable.
            const OPAQUE_REJECTION = [
              '## PR Quality Gate: rejected',
              '',
              'This pull request was flagged as potentially AI generated and did not pass the automated quality review for this repository.',
              '',
              'Please review the contribution guidelines and resubmit. If you believe this rejection is in error, open an issue.',
            ].join('\n');

            // Helper: post a comment and close the PR.
            async function reject(label, commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                body: commentBody,
              });
              try {
                await github.rest.issues.addLabels({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: pr.number,
                  labels:       [label],
                });
              } catch { /* label may not exist; non-fatal */ }
              await github.rest.pulls.update({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: pr.number,
                state:       'closed',
              });
            }

            // ── 1. Unapproved bot author ────────────────────────────────
            if (author.endsWith('[bot]')) {
              await reject('gate:quality:unapproved-bot', [
                '## PR Quality Gate: unapproved bot author',
                '',
                'This PR was opened by `' + author + '`, which is not on the approved automation allow-list.',
                'Automated PRs must come through Dependabot or a bot explicitly approved by the maintainer.',
                '',
                'If you intended to open this yourself, please reopen from a human account.',
              ].join('\n'));
              core.setFailed("Rejected: unapproved bot author '" + author + "'");
              return;
            }

            // ── 2. AI-generation markers ────────────────────────────────
            // Detects common AI tool disclosures in title or body.
            const AI_PATTERNS = [
              /generated by claude/i,
              /generated by chatgpt/i,
              /generated by gemini/i,
              /generated by (an? )?ai\b/i,
              /co-authored-by:?\s+claude/i,
              /co-authored-by:?\s+chatgpt/i,
              /this (pr|pull request) was (created|generated|written) by (an? )?ai/i,
              /🤖/,
            ];
            const fullText = title + '\n' + body;
            const aiMatch = AI_PATTERNS.find(p => p.test(fullText));
            if (aiMatch) {
              await reject('gate:quality:rejected', OPAQUE_REJECTION);
              core.setFailed('Rejected: AI-generation markers detected');
              return;
            }

            // ── 3. Em or en dashes in title, body, or added diff lines ──
            // Project convention: ASCII-only punctuation. Em (U+2014) and
            // en (U+2013) dashes are forbidden in source files, project
            // docs, and PR metadata. They are a common tell of AI text.
            //
            // The diff scan looks only at lines the PR ADDS (lines that
            // begin with `+` in the unified diff, excluding the `+++`
            // file-header line). A PR that REMOVES em/en dashes passes
            // cleanly. Binary files have no patch text and are skipped.
            //
            // Exemptions: files named LICENSE, NOTICE, or COPYING (plus
            // their .md / .txt / .rst variants) are skipped because
            // upstream third-party license text legitimately contains
            // these characters.
            const DASH_RE        = /[–—]/;
            const DASH_EXEMPT_RE = /^(LICENSE|NOTICE|COPYING)(?:[.\-_].*)?$/i;
            const dashViolations = [];
            if (DASH_RE.test(title)) {
              dashViolations.push('PR title: ' + title);
            }
            if (DASH_RE.test(body)) {
              const bodyLines = body.split('\n');
              for (let i = 0; i < bodyLines.length; i++) {
                if (DASH_RE.test(bodyLines[i])) {
                  dashViolations.push('PR body line ' + (i + 1) + ': ' + bodyLines[i]);
                }
              }
            }
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: pr.number,
                per_page:    100,
              });
              for (const f of files) {
                if (!f.patch) continue;
                const basename = f.filename.split('/').pop();
                if (DASH_EXEMPT_RE.test(basename)) continue;
                let lineNum = 0;
                for (const line of f.patch.split('\n')) {
                  const hunk = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)/);
                  if (hunk) { lineNum = parseInt(hunk[1], 10) - 1; continue; }
                  if (line.startsWith('+++')) continue;
                  if (line.startsWith('+')) {
                    lineNum++;
                    if (DASH_RE.test(line)) {
                      dashViolations.push(f.filename + ':' + lineNum + ': ' + line);
                    }
                    continue;
                  }
                  if (line.startsWith('-')) continue;
                  if (line.startsWith(' ')) lineNum++;
                }
              }
            } catch (err) {
              core.warning('Could not list PR files for em or en dash scan: ' + err.message);
            }
            if (dashViolations.length > 0) {
              await reject('gate:quality:rejected', OPAQUE_REJECTION);
              // Detail is logged to the workflow run only (visible to
              // maintainers, not posted as a PR comment) so AI tools
              // reading the rejection cannot learn what pattern fired.
              for (const v of dashViolations.slice(0, 25)) {
                core.warning('Em/en dash violation: ' + v);
              }
              if (dashViolations.length > 25) {
                core.warning('Em/en dash violations: and ' + (dashViolations.length - 25) + ' more (truncated)');
              }
              core.setFailed('Rejected: em or en dash detected in title, body, or added diff lines');
              return;
            }

            // ── 4. Linked issue ─────────────────────────────────────────
            // Accepted keywords from the GitHub autolink spec (case-insensitive).
            // Matches "closes #N", "fixes #N", "resolves #N" and their variants,
            // as well as cross-repo refs ("owner/repo#N").
            //
            // Exemption: release-bump PRs aggregate prior merged PRs (each of
            // which already carried its own linked issue) and have no single
            // issue to reference. Detected by conventional-commit title prefix
            // `chore(release):` or branch naming convention `release/...`.
            //
            // Gated to trusted authors (OWNER/MEMBER/COLLABORATOR per
            // pr.author_association) so an outside contributor cannot bypass
            // the linked-issue gate just by titling a PR `chore(release):` or
            // pushing from a fork branch named `release/...`.
            const TRUSTED_ASSOCIATIONS = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const isTrustedAuthor = TRUSTED_ASSOCIATIONS.includes(pr.author_association);
            const isReleaseBump = isTrustedAuthor && (
              /^chore\(release\)/i.test(title) ||
              /^release\//.test(pr.head.ref)
            );
            if (isReleaseBump) {
              core.info('PR #' + pr.number + ' is a release-bump; exempt from linked-issue requirement');
            } else {
              const ISSUE_RE = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:[a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+)?#\d+/i;
              if (!ISSUE_RE.test(body)) {
                await reject('gate:quality:needs-issue', [
                  '## PR Quality Gate: no linked issue',
                  '',
                  'Every PR must reference an issue that describes the motivation for the change.',
                  '',
                  'Add a closing reference to your PR description:',
                  '',
                  '```',
                  'Closes #N',
                  '```',
                  '',
                  'Replace `N` with the issue number. If no issue exists yet, please open one first.',
                ].join('\n'));
                core.setFailed('Rejected: no linked issue in PR body');
                return;
              }
            }

            core.info('PR #' + pr.number + ' passed all quality checks');
            await clearManagedLabels();
