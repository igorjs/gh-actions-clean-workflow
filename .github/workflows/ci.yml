name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-check:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm run test:coverage
      - name: Upload coverage summary
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run integration tests
        uses: ./.github/actions/integration-test-suite

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Verify build succeeded
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "::error::Build failed - dist/index.js not found"
            exit 1
          fi
          echo "Build completed successfully"

  # Aggregator used as the single required branch-protection check
  report-ci-status:
    name: Report CI Status
    runs-on: ubuntu-latest
    needs: [lint-check, unit-tests, integration-tests, build-check]
    if: always()
    steps:
      - name: Check CI status
        env:
          LINT: ${{ needs.lint-check.result }}
          TESTS: ${{ needs.unit-tests.result }}
          INTEGRATION: ${{ needs.integration-tests.result }}
          BUILD: ${{ needs.build-check.result }}
        run: |
          if [[ "$LINT" != "success" || "$TESTS" != "success" || "$INTEGRATION" != "success" || "$BUILD" != "success" ]]; then
            echo "::error::CI failed - lint=$LINT tests=$TESTS integration=$INTEGRATION build=$BUILD"
            exit 1
          fi
          echo "All CI checks passed"
